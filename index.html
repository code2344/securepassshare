  .header {

    font-size: 28px;

    margin-bottom: 30px;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 15px;

  .nav-link {
    flex: 1;
    padding: 10px;
    text-align: center;
    text-decoration: none;
    color: #666;
    border-radius: 8px;

    font-weight: 500;

  .nav-link.active {

  }

  .nav-link:hover:not(.active) {
    background: #f5f5f5;

  .form-group {
    margin-bottom: 25px;
  }

  label {
    display: block;
    color: #333;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 14px;
  }

  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s ease;

  input[type="password"]:focus,
  input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
  }

  button[type="submit"]:active {
    transform: translateY(0);
  }

  button[type="submit"]:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .status {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .status.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
  }

  .status.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
  }

  .icon {
    font-size: 48px;
    margin-bottom: 15px;
  }

  @media (max-width: 600px) {
    .container {
      padding: 30px 20px;
    }

    .header h1 {
      font-size: 24px;
    }

</style>

<body>

<div class="container">
  <div class="header">
    <div class="icon">🔐</div>
    <h1>Secure Password Share</h1>
    <p>Encrypt and send passwords securely</p>
  </div>

  <div class="nav-links">
    <a href="index.html" class="nav-link active">Encode</a>
    <a href="decode.html" class="nav-link">Decode</a>
  </div>

  <form id="secureForm">
    <div class="form-group">
      <label for="password">Password to Encrypt:</label>
      <input type="password" id="password" placeholder="Enter password to encrypt" required>
    </div>
    <button type="submit">🔒 Encrypt & Send</button>
  </form>

  <div id="status"></div>
</div>

<script>
// === Your RSA public key (DER base64 from step 2) ===
const publicKeyBase64 = "MIICIjANBgkqhkiG9w0BAQEFAAOCAg8AMIICCgKCAgEAwrpKoudA8/leYULuPqeC4PhjhlEKJJYDYU2xTTvuPrPoO7P1eKdOPGNGDT3MO5oo17Zj3LScPSsvQgaf0Sg1lVfoRtbiWnGJz2zimbyZJv/XgIX+tPnghuNpvY38Yt4zlHMg3VdlMEWxdiGcXsvrr2Ln00lVyhqhSNfdzO/OrUjzu0JCMV8vMPTXzKG3wWoWVNES+tAI9uSaPUg/OdTwg2C92fUQR9VKfS9xFf9CMrWQLeydjmJ5pwZ1fpJkKQGKenVWnuYCPInn9QI6Y+7hqgFAX2lwocDB1vPRyk43VeZnUcZfBjKYKsKemH+3y5Ey1Vt0aaaFgWe4FCYKkqopP/0UdL1RG56UBA28XFYg4sX9ckx9ZjITdLBcyMPV7Hfamrv1QffA2LGzZKmDtxOs/2Zt2FeeHtg3Zd39HOlhl/jHAGFN9Zmb3SmPQd+eeCP0kesAeNhQ7+5/MstRu2He/s/Ig99vLl8vOsJeQHj0vyUmRQNSF2Q/FNJz7u5kRuWClLVaEOTL7yuaL99fh3mT0t+o36EWUU/wRnRrESGd9LplzUGLt4R0b9iCEicp9U+P/XC9e91r6cr18qcVMu+Tvr8x4tCwJTInBDooaCVrtWEmG8l8Rf2feV2BeBf+Kb9A0OT4qzQAqSZnkXHYEYglDSN7/dSqj2HLbLvPsbxFMA8CAwEAAQ==";

// Convert base64 → ArrayBuffer
function base64ToArrayBuffer(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes.buffer;
}

// Import RSA key into WebCrypto
async function importPublicKey() {
  return await crypto.subtle.importKey(
    "spki",
    base64ToArrayBuffer(publicKeyBase64),
    {
      name: "RSA-OAEP",
      hash: "SHA-256"
    },
    false,
    ["encrypt"]
  );
}

// Encrypt text using RSA-OAEP
async function encryptMessage(message) {
  const key = await importPublicKey();
  const encoded = new TextEncoder().encode(message);

  const ciphertext = await crypto.subtle.encrypt(
    { name: "RSA-OAEP" },
    key,
    encoded
  );

  // Convert to base64 for Formspree transport
  const bytes = new Uint8Array(ciphertext);
  let binary = "";
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

document.getElementById("secureForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const password = document.getElementById("password").value;
  const encrypted = await encryptMessage(password);

  await fetch("https://formspree.io/f/YOUR_FORMSPREE_ENDPOINT", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      encrypted_password: encrypted
    })
  });

  const statusEl = document.getElementById("status");
  statusEl.className = "status success";
  statusEl.textContent = "✓ Sent successfully! Only the private key holder can decrypt this.";
  
  document.getElementById("password").value = "";
});
</script>
